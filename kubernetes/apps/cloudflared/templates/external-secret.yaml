# Tunnel token from Key Vault (written there by terraform/50-cloudflare --
# the one vault secret Terraform writes rather than reads). Key carries this
# namespace's prefix per the Kyverno isolation policy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: cloudflared-token
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: cloudflared--tunnel-token

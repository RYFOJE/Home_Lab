# The single cluster-wide store. Authenticates with the Terraform-created
# azure-kv-creds Secret in the external-secrets namespace (60-argo-cd
# gitops.tf) -- the only place that credential exists. A namespaced SecretStore
# would need its own credential in its own namespace, which never exists, and
# the Kyverno policies below forbid any second store. That is what makes a
# namespace unable to reach Key Vault by any path other than this store.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-kv
spec:
  provider:
    azurekv:
      authType: ServicePrincipal
      vaultUrl: {{ required "vaultUrl must be injected by the root Application" .Values.vaultUrl | quote }}
      tenantId: {{ required "global.tenantId must be injected by the root Application" .Values.global.tenantId | quote }}
      authSecretRef:
        clientId:
          name: azure-kv-creds
          namespace: external-secrets
          key: client-id
        clientSecret:
          name: azure-kv-creds
          namespace: external-secrets
          key: client-secret

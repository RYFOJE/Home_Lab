# Key Vault -> in-cluster Secrets via ESO (kubernetes/apps/cluster-secrets).
# Keys are namespace-prefixed per the Kyverno isolation policy: this app lives
# in `monitoring`, so both keys start with `monitoring--`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    template:
      engineVersion: v2
      data:
        # admin-user is not a secret; the password comes from Key Vault.
        admin-user: admin
        admin-password: "{{ .adminPassword }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: monitoring--grafana-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord
  data:
    - secretKey: webhook-url
      remoteRef:
        key: monitoring--discord-webhook-url

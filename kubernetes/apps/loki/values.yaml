loki:
  # Monolithic single binary -- one replica, filesystem storage on a Longhorn
  # volume (replication comes from Longhorn, not Loki).
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 336h # 14d
    compactor:
      retention_enabled: true
      delete_request_store: filesystem

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: longhorn
      size: 25Gi

  # Scalable-mode components off in SingleBinary mode.
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  # Chart extras not needed at this scale: memcached pair, nginx gateway,
  # canary and the helm test pod.
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
